<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Sholat - BQ Islamic Boarding School</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div class="bg">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="./images/Logo-bina-qurani-islamic-boarding-school.png" alt="Logo" class="sidebar-logo">
      </div>

      <div class="clock-section">
        <h1 id="live-clock">00:00:00</h1>
        <p id="tanggal-hari-ini">Senin, 01 Januari 2024</p>
        <p id="tanggal-hijri">01 Ramadhan 1445 H</p>
      </div>

      <div class="info-section">
        <div class="arched-frame">
          <div class="info-content">
            <div class="info-card">
              <span class="label muadzin">MUADZIN</span>
              <h2 id="muadzin-name">MUHAMMAD FULAN</h2>
            </div>
            <div class="info-card">
              <span class="label khatib">KHATIB</span>
              <h2 id="khatib-name">AHMAD FULAN</h2>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-overlay">
        <div class="main-header">
          <img src="./images/Arabic-Text-With-School-Name.png"
            alt="Pondok Pesantren Bina Qurani - Islamic School Bogor Indonesia" class="header-image">
        </div>

        <div class="prayer-bar-container">
          <div class="prayer-pattern"></div>
          <div class="prayer-bar">
            <div class="prayer-box" data-prayer="Subuh">
              <span class="p-name">SUBUH</span>
              <span class="p-time" id="subuh">04:30</span>
            </div>
            <div class="prayer-box" data-prayer="Syuruq">
              <span class="p-name">DHUHA</span>
              <span class="p-time" id="dhuha">07:30</span>
            </div>
            <div class="prayer-box active" data-prayer="Dzuhur">
              <span class="p-name">ZUHUR</span>
              <span class="p-time" id="dzuhur">12:00</span>
            </div>
            <div class="prayer-box" data-prayer="Ashar">
              <span class="p-name">ASHAR</span>
              <span class="p-time" id="ashar">15:30</span>
            </div>
            <div class="prayer-box" data-prayer="Maghrib">
              <span class="p-name">MAGHRIB</span>
              <span class="p-time" id="maghrib">18:10</span>
            </div>
            <div class="prayer-box" data-prayer="Isya">
              <span class="p-name">ISYA</span>
              <span class="p-time" id="isya">19:10</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Iqomah Overlay -->
    <div id="iqomah-overlay" class="hidden">
      <div class="iqomah-content">
        <h1 class="iqomah-title">MEMASUKI WAKTU IQOMAH</h1>
        <div class="iqomah-timer">
          <div class="timer-box">
            <span id="iqomah-min">00</span>
          </div>
          <span class="timer-separator">:</span>
          <div class="timer-box">
            <span id="iqomah-sec">00</span>
          </div>
        </div>
        <p id="iqomah-motivation" class="iqomah-motivation"></p>
      </div>
    </div>

    <!-- Prayer Completion Overlay -->
    <div id="prayer-completion-overlay" class="hidden">
      <div class="completion-content">
        <img src="./images/Arabic-Text-With-School-Name.png" alt="Logo" class="completion-logo">
        <h1 class="completion-text">Selamat menunaikan ibadah salat</h1>
      </div>
    </div>


  </div>

  <script type="module" src="./js/script.js"></script>
</body>

</html>
